<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Newsletter Translator</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>Newsletter Translator</h1>
      <p class="subtitle">Translate email newsletters automatically</p>
    </header>

    <!-- Relay email card -->
    <section class="card" id="relay-card">
      <h2>Your Relay Address</h2>
      <p class="hint">Forward any newsletter to this address and it will be translated and sent to your destination email.</p>
      <div class="relay-row">
        <input type="text" id="relay-email" class="relay-input" readonly />
        <button id="copy-btn" class="btn btn-secondary" title="Copy to clipboard">Copy</button>
      </div>
      <p id="copy-feedback" class="copy-feedback hidden">Copied!</p>
    </section>

    <!-- Configuration card -->
    <section class="card" id="config-card">
      <h2>Configuration</h2>
      <form id="config-form">
        <div class="field">
          <label for="source-lang">Source Language</label>
          <select id="source-lang" name="source_lang">
            <option value="en">English</option>
            <option value="zh">Chinese (Simplified)</option>
            <option value="ja">Japanese</option>
            <option value="ko">Korean</option>
            <option value="fr">French</option>
            <option value="de">German</option>
            <option value="es">Spanish</option>
          </select>
        </div>
        <div class="field">
          <label for="target-lang">Target Language</label>
          <select id="target-lang" name="target_lang">
            <option value="zh">Chinese (Simplified)</option>
            <option value="en">English</option>
            <option value="ja">Japanese</option>
            <option value="ko">Korean</option>
            <option value="fr">French</option>
            <option value="de">German</option>
            <option value="es">Spanish</option>
          </select>
        </div>
        <div class="field">
          <label for="dest-email">Destination Email</label>
          <input type="email" id="dest-email" name="dest_email" placeholder="you@example.com" />
          <p class="field-hint">Translated newsletters will be forwarded here.</p>
        </div>
        <div class="form-actions">
          <button type="submit" class="btn btn-primary" id="save-btn">Save</button>
          <span id="save-feedback" class="save-feedback hidden"></span>
        </div>
      </form>
    </section>

    <!-- Recent emails card -->
    <section class="card" id="logs-card">
      <div class="logs-header">
        <h2>Recent Emails</h2>
        <button id="refresh-btn" class="btn btn-secondary btn-sm">Refresh</button>
      </div>
      <div id="logs-container">
        <p class="loading">Loading...</p>
      </div>
    </section>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
